<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黃信育的個人網頁</title>
    <style>
        /* 基礎版面設定 */
        body {
            font-family: "Helvetica Neue", Helvetica, Arial, "PingFang TC", "微軟正黑體", sans-serif;
            background-color: #f4f4f9;
            color: #333333;
            text-align: center;
            padding: 10vh 20px; /* 讓內容在畫面上方稍微置中 */
            margin: 0;
        }

        /* 中間的白色卡片 */
        .card {
            max-width: 400px;
            margin: 0 auto;
            background-color: #ffffff;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        /* 圓形大頭照 */
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            background-color: #eeeeee; /* 照片還沒載入時的底色 */
        }

        /* 文字樣式 */
        h1 {
            font-size: 24px;
            margin: 0 0 10px 0;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            color: #666666;
            margin-bottom: 30px;
        }

        /* 聯絡按鈕 */
        .btn {
            display: inline-block;
            background-color: #333333;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #555555;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&q=80&w=200&h=200" alt="黃信育的照片" class="profile-pic">
        
        <h1>黃信育</h1>
        <p>你好！這是我最簡單的線上個人名片。<br>歡迎來到我的專屬網頁。</p>
        
        <a href="mailto:your.email@example.com" class="btn">與我聯絡</a>
    </div>

</body>
</html>
